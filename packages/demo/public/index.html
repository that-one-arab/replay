<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Orbit onboarding</title>
    <link rel="stylesheet" href="/orbit-assets.css">
    <style>
      :root { font-family: Inter, ui-sans-serif, system-ui, sans-serif; color:#1b2540; background:#f5f7fc; } *{box-sizing:border-box} body{margin:0;min-height:100vh;background:radial-gradient(circle at 90% 8%,#d8d7ff 0,transparent 28%),#f5f7fc} header{height:70px;padding:0 7vw;display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.72);border-bottom:1px solid #e7eaf2}.logo{font-weight:800;font-size:21px;letter-spacing:-.06em}.logo i{font-style:normal;color:#725cf2}.help{color:#69728b;font-size:14px}main{width:min(960px,90vw);margin:76px auto} .eyebrow{font-size:11px;font-weight:800;letter-spacing:.14em;color:#7867e9;margin:0 0 12px}.headline{font-size:42px;letter-spacing:-.055em;margin:0;max-width:620px}.lede{color:#68728a;font-size:17px;line-height:1.55;max-width:560px;margin:17px 0 34px}.card{background:white;border:1px solid #e5e9f2;border-radius:20px;padding:31px;box-shadow:0 22px 50px rgba(41,53,89,.09)}.card h2{margin:0;font-size:22px;letter-spacing:-.04em}.card p{color:#6f7890}.primary{background:#715bf0;color:white;border:0;border-radius:10px;padding:13px 18px;font-weight:750;cursor:pointer;box-shadow:0 8px 18px rgba(103,82,226,.28)}.primary:hover{background:#6049e2}.plans{display:grid;grid-template-columns:repeat(3,1fr);gap:13px;margin:22px 0}.plan{position:relative;padding:19px;border:1px solid #e0e5ef;border-radius:13px;cursor:pointer;background:white;text-align:left}.plan.selected{border-color:#7560ec;background:#f7f5ff;box-shadow:0 0 0 3px #e5e0ff}.plan b{display:block;font-size:16px}.plan span{display:block;color:#7d8599;font-size:13px;margin-top:5px}.plan strong{display:block;margin-top:13px;font-size:19px}.check{position:absolute;top:12px;right:12px;width:19px;height:19px;border-radius:50%;background:#7460ec;color:#fff;text-align:center;font-size:12px;line-height:19px}.field{display:grid;gap:8px;max-width:480px}.field label{font-size:13px;font-weight:700}.field input{padding:13px;border-radius:9px;border:1px solid #dbe1ec;font:inherit}.footer{display:flex;justify-content:space-between;align-items:center;margin-top:27px;color:#838ba0;font-size:13px}.success{padding:16px;background:#eefbf5;border:1px solid #bee9d5;border-radius:11px;color:#237a52;margin:17px 0}.copy{background:#fff;border:1px solid #dce2ed;border-radius:8px;padding:10px 13px;cursor:pointer;color:#34405c}.done-icon{display:grid;place-items:center;width:48px;height:48px;border-radius:15px;background:#e8e3ff;color:#6e58e9;font-size:24px;margin-bottom:16px}
    </style>
  </head>
  <body>
    <header><div class="logo"><img class="logo-mark" src="/orbit-mark.svg" alt="" />orb<i>it</i></div><div class="help">Need help? <b>Talk to us</b></div></header>
    <main id="app"></main>
    <script>
      const app = document.querySelector('#app'); let step = 0; let plan = 'Growth';
      const render = () => {
        if (step === 0) app.innerHTML = `<p class=eyebrow>WELCOME TO ORBIT</p><h1 class=headline>Build a calmer customer workspace.</h1><p class=lede>Set up a focused space for your team in less than a minute. You can fine tune every detail later.</p><section class=card><h2>Create your workspace</h2><p>Start with the essentials, then make it yours.</p><button class=primary id=start>Set up workspace <span>→</span></button></section>`;
        if (step === 1) app.innerHTML = `<p class=eyebrow>STEP 1 OF 2</p><h1 class=headline>Choose your starting plan.</h1><section class=card><h2>Plans that grow with your team</h2><div class=plans>${['Starter','Growth','Scale'].map((name,i)=>`<button class="plan ${plan===name?'selected':''}" data-plan="${name}">${plan===name?'<i class=check>✓</i>':''}<b>${name}</b><span>${['For a fresh idea','For busy teams','For larger operations'][i]}</span><strong>${['$0','$24','$69'][i]}<small>/mo</small></strong></button>`).join('')}</div><div class=footer><span>Change anytime. No long contracts.</span><button class=primary id=continue>Continue</button></div></section>`;
        if (step === 2) app.innerHTML = `<p class=eyebrow>STEP 2 OF 2</p><h1 class=headline>Give your workspace a name.</h1><section class=card><h2>Make it recognizable</h2><p>This is how your team will see it in Orbit.</p><div class=field><label for=name>Workspace name</label><input id=name value="Northstar Studio" /></div><div class=footer><span>Your team can join after this step.</span><button class=primary id=finish>Create workspace</button></div></section>`;
        if (step === 3) app.innerHTML = `<section class=card><div class=done-icon>✦</div><p class=eyebrow>YOU'RE READY</p><h1 class=headline>Northstar Studio is live.</h1><div class=success>Your Growth workspace has been created and is ready for your team.</div><button class=copy id=copy>Copy invite link</button> <button class=copy id=preview>Open invite preview</button></section>`;
        wire();
      };
      const wire = () => { document.querySelector('#start')?.addEventListener('click',()=>{step=1;render()}); document.querySelectorAll('[data-plan]').forEach(el=>el.addEventListener('click',()=>{plan=el.dataset.plan;render()})); document.querySelector('#continue')?.addEventListener('click',()=>{step=2;render()}); document.querySelector('#finish')?.addEventListener('click',()=>{step=3;render()}); document.querySelector('#copy')?.addEventListener('click',e=>{e.currentTarget.textContent='Invite link copied ✓'}); document.querySelector('#preview')?.addEventListener('click',()=>window.open('/invite-preview','orbit-invite-preview')); }; render();
    </script>
  </body>
</html>
