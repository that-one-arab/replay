# Railway config for the @replay/landing marketing service.
# Separate from the root railway.toml (which runs the share-server) so each
# service owns its own builder + healthcheck. Point the landing service's
# railwayConfigFile at this file.
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.landing"

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
